name: biblelib
description: "Your personal offline Bible library"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  get_it: ^9.2.1
  injectable: ^3.0.0
  dio: ^5.9.2
  froom: ^6.0.0
  sqflite: ^2.4.2+1
  workmanager: ^0.9.0+3
  flutter_dotenv: ^6.0.1
  shared_preferences: ^2.5.5
  animated_text_kit: ^4.3.0
  flutter_html: ^3.0.0
  equatable: ^2.0.8
  dartz: ^0.10.1
  intl: ^0.20.2
  styled_widget: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  froom_generator: ^6.0.0
  mockito: ^5.6.4

flutter:
  uses-material-design: true