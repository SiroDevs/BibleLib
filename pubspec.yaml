name: biblelib
description: "Your personal offline Bible library"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  get_it: ^7.7.0
  injectable: ^2.4.2
  dio: ^5.4.3
  floor: ^1.4.0
  sqflite: ^2.3.2
  workmanager: ^0.5.2
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3
  animated_text_kit: ^4.2.2
  flutter_html: ^3.0.0-beta.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.19.0
  styled_widget: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  froom_generator: ^4.0.0
  build_runner: ^2.10.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - .env
